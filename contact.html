<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vinyl Vibes | 聯絡我們 (Contact Us)</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="header-placeholder"></div>

  <main class="container animate-fade">
    <h1 class="section-title">聯絡我們 Contact Us</h1>
    <div class="content-box">
      <p style="text-align: center; margin-bottom: 2rem;">對於某張唱片有任何疑問嗎？正在尋找特定的版本？請留言給我們！</p>
      
      <form onsubmit="event.preventDefault(); alert('訊息已成功送出！'); this.reset();">
        <div class="form-group">
          <label for="name">姓名</label>
          <input type="text" id="name" required placeholder="您的姓名">
        </div>
        
        <div class="form-group">
          <label for="email">電子郵件</label>
          <input type="email" id="email" required placeholder="your.email@example.com">
        </div>
        
        <div class="form-group">
          <label for="subject">主旨</label>
          <input type="text" id="subject" required placeholder="您想詢問什麼？">
        </div>
        
        <div class="form-group">
          <label for="message">訊息內容</label>
          <textarea id="message" rows="5" required placeholder="在此輸入您的訊息..."></textarea>
        </div>
        
        <button type="submit" class="btn" style="width: 100%;">送出訊息</button>
      </form>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="js/app.js"></script>
  <script src="js/components.js"></script>
</body>
</html>

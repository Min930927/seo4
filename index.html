<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vinyl Vibes | 首頁</title>
  <meta name="description" content="Vinyl Vibes - 您的首選黑膠唱片行。探索最新、最經典的各國唱片。">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="header-placeholder"></div>

  <main>
    <section class="hero">
      <div class="hero-content animate-fade">
        <h1>探索真實的聲音</h1>
        <p>來自世界各地的高品質黑膠唱片。沉浸在節奏中，尋找您的下一張最愛專輯。</p>
        <a href="#featured" class="btn">立即選購</a>
      </div>
    </section>

    <section id="featured" class="container">
      <h2 class="section-title">精選推薦</h2>
      <div class="product-grid" id="product-list">
        <!-- Products injected via JS -->
      </div>
    </section>
  </main>

  <div id="footer-placeholder"></div>

  <script src="js/app.js"></script>
  <script src="js/components.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Display first 8 products on home page
      const container = document.getElementById('product-list');
      if (container) {
        container.innerHTML = products.slice(0, 8).map(p => createProductCard(p)).join('');
      }
    });
  </script>
</body>
</html>

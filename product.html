<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vinyl Vibes | 產品詳情</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="header-placeholder"></div>

  <main class="container animate-fade" id="product-detail-view">
    <!-- Product detail injected via JS -->
    <div style="text-align: center; padding: 5rem;">
      <h2>Loading...</h2>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="js/app.js"></script>
  <script src="js/components.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const productId = urlParams.get('id');
      const container = document.getElementById('product-detail-view');
      
      if (!productId) {
        container.innerHTML = '<div style="text-align: center; padding: 5rem;"><h2>找不到此產品</h2><a href="index.html" class="btn" style="margin-top: 1rem;">返回首頁</a></div>';
        return;
      }

      const product = getProductById(productId);
      
      if (product) {
        document.title = `Vinyl Vibes | ${product.title}`;
        container.innerHTML = `
          <div class="product-detail-container">
            <div>
              <img src="${product.img}" alt="${product.title}" class="product-detail-img">
            </div>
            <div class="product-detail-info">
              <h1>${product.title}</h1>
              <div class="product-detail-artist">${product.artist}</div>
              <div class="product-detail-price">${product.price}</div>
              <p class="product-desc">${product.desc}</p>
              
              <div class="product-meta">
                <div><span>發行廠牌：</span> <span>${product.label}</span></div>
                <div><span>發行年份：</span> <span>${product.year}</span></div>
                <div><span>實體格式：</span> <span>12 吋黑膠 LP</span></div>
              </div>
              
              <button class="btn add-to-cart" onclick="alert('已加入購物車！')">加入購物車</button>
            </div>
          </div>
        `;
      } else {
        container.innerHTML = '<div style="text-align: center; padding: 5rem;"><h2>找不到此產品</h2><a href="index.html" class="btn" style="margin-top: 1rem;">返回首頁</a></div>';
      }
    });
  </script>
</body>
</html>
